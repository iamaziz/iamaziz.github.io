<!DOCTYPE html>
<html lang="ar" dir="rtl" theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="موسوعة الكلمات - تصفح وقراءة كلمات الأغاني العربية المفضلة لديك بالكامل بدون إنترنت وبشكل مريح.">
  <title>أثير الكلمات | كلمات الأغاني العربية</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       CSS Variables & Themes
       ========================================================================== */
    :root[theme="dark"] {
      --bg:           #0d0f18;
      --bg-raised:    #141720;
      --bg-card:      rgba(20, 23, 32, 0.75);
      --border:       rgba(255,255,255,0.07);
      --text:         #eef0f5;
      --text-sub:     #8b94a8;
      --text-muted:   #555e72;
      --accent:       #c8a84b;
      --accent-rgb:   200, 168, 75;
      --accent-dim:   rgba(200, 168, 75, 0.12);
      --accent-glow:  0 0 20px rgba(200, 168, 75, 0.25);
      --glass:        rgba(13, 15, 24, 0.82);
      --shadow:       0 8px 32px rgba(0,0,0,0.4);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.2);
      /* Lyric reading specific */
      --lyric-font:   'Amiri', serif;
      --lyric-color:  #dde2ed;
      --lyric-bg:     #0d0f18;
    }

    :root[theme="light"] {
      --bg:           #f7f5f0;
      --bg-raised:    #ffffff;
      --bg-card:      rgba(255,255,255,0.9);
      --border:       rgba(0,0,0,0.07);
      --text:         #1a1a2e;
      --text-sub:     #5a6070;
      --text-muted:   #9aa0b0;
      --accent:       #9a6f1a;
      --accent-rgb:   154, 111, 26;
      --accent-dim:   rgba(154, 111, 26, 0.08);
      --accent-glow:  0 0 20px rgba(154, 111, 26, 0.12);
      --glass:        rgba(247, 245, 240, 0.88);
      --shadow:       0 8px 32px rgba(0,0,0,0.08);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.05);
      --lyric-font:   'Amiri', serif;
      --lyric-color:  #2a2a3e;
      --lyric-bg:     #f7f5f0;
    }

    :root[theme="sepia"] {
      --bg:           #f0e8d5;
      --bg-raised:    #faf4e6;
      --bg-card:      rgba(250,244,230,0.92);
      --border:       rgba(100,80,40,0.12);
      --text:         #3d2b14;
      --text-sub:     #6b5230;
      --text-muted:   #a08860;
      --accent:       #7a4f12;
      --accent-rgb:   122, 79, 18;
      --accent-dim:   rgba(122, 79, 18, 0.1);
      --accent-glow:  0 0 20px rgba(122, 79, 18, 0.12);
      --glass:        rgba(240, 232, 213, 0.9);
      --shadow:       0 8px 32px rgba(80,50,10,0.08);
      --shadow-sm:    0 2px 8px rgba(80,50,10,0.04);
      --lyric-font:   'Amiri', serif;
      --lyric-color:  #3d2b14;
      --lyric-bg:     #f0e8d5;
    }

    /* ==========================================================================
       Reset & Base
       ========================================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cairo', 'Tajawal', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ==========================================================================
       Header — compact, single line
       ========================================================================== */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1.25rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), rgba(var(--accent-rgb),0.5));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .logo:hover .logo-mark { transform: rotate(-8deg) scale(1.05); }

    .logo-name {
      font-family: 'Tajawal', sans-serif;
      font-weight: 900;
      font-size: 1.15rem;
      background: linear-gradient(120deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    /* Search — grows to fill space */
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 0.5rem 1.1rem 0.5rem 2.75rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: var(--accent-glow);
    }
    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }
    .search-input:focus ~ .search-icon { color: var(--accent); }

    /* Header action buttons */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      margin-right: auto; /* push to the left since RTL */
    }

    .hbtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s ease;
    }
    .hbtn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .hbtn svg { width: 17px; height: 17px; }

    .hbtn .badge {
      position: absolute;
      top: -3px;
      right: -3px;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      border: 1.5px solid var(--bg);
    }

    /* Theme picker */
    .theme-picker {
      position: relative;
    }
    .theme-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.4rem;
      display: none;
      flex-direction: column;
      gap: 2px;
      min-width: 130px;
      box-shadow: var(--shadow);
      z-index: 300;
    }
    .theme-dropdown.open { display: flex; animation: dropIn 0.2s ease; }

    .theme-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      text-align: right;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      transition: background 0.15s;
    }
    .theme-btn:hover { background: var(--accent-dim); color: var(--accent); }
    .theme-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Favorites panel — slides down from header */
    .fav-panel {
      position: absolute;
      top: 58px;
      left: 0;
      right: 0;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 190;
    }
    .fav-panel.open { max-height: 400px; }

    .fav-panel-inner {
      padding: 1rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .fav-panel-header {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fav-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      list-style: none;
      max-height: 280px;
      overflow-y: auto;
    }

    .fav-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.82rem;
    }
    .fav-chip:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .fav-chip-title { font-weight: 600; color: var(--text); }
    .fav-chip-artist { color: var(--text-muted); font-size: 0.75rem; }

    .fav-chip-remove {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      margin-right: 0.2rem;
      transition: color 0.15s;
    }
    .fav-chip-remove:hover { color: #ef4444; }
    .fav-chip-remove svg { width: 12px; height: 12px; }

    .fav-empty {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }

    /* ==========================================================================
       Main Content — full width, no sidebar
       ========================================================================== */
    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ==========================================================================
       Section titles
       ========================================================================== */
    .section-title {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ==========================================================================
       Artist Grid — clean, text-forward cards
       ========================================================================== */
    .grid-artists {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .card-artist {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 1.25rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: all 0.25s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .card-artist::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .card-artist:hover {
      transform: translateY(-3px);
      border-color: rgba(var(--accent-rgb), 0.3);
      box-shadow: var(--shadow), var(--accent-glow);
    }
    .card-artist:hover::before { opacity: 1; }

    .artist-name {
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
    }
    .artist-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .artist-count span {
      color: var(--accent);
      font-weight: 700;
    }

    /* ==========================================================================
       Song List — compact, scannable rows
       ========================================================================== */
    .breadcrumb {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .breadcrumb a {
      color: var(--accent);
      transition: opacity 0.15s;
    }
    .breadcrumb a:hover { opacity: 0.75; }

    .songs-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-song {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s ease;
    }
    .card-song:hover {
      border-color: rgba(var(--accent-rgb), 0.35);
      background: var(--accent-dim);
      transform: translateX(-3px);
    }

    .song-info {
      flex: 1;
      min-width: 0;
    }
    .song-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-meta-row {
      display: flex;
      gap: 1rem;
      margin-top: 0.2rem;
      font-size: 0.76rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .song-snippet-row {
      margin-top: 0.3rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }
    .song-year-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(var(--accent-rgb),0.25);
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      font-weight: 600;
      align-self: flex-start;
    }

    /* ==========================================================================
       LYRICS SCREEN — the hero of the whole UI
       ========================================================================== */
    .lyrics-page {
      display: flex;
      flex-direction: column;
    }

    /* Back + title bar */
    .lyrics-topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      color: var(--text-sub);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .back-btn svg { width: 18px; height: 18px; }

    .lyrics-title-block {
      flex: 1;
      min-width: 0;
    }
    .lyrics-song-title {
      font-family: 'Tajawal', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      color: var(--accent);
      line-height: 1.15;
    }
    .lyrics-artist-name {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-top: 0.15rem;
    }

    .lyrics-topbar-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* Metadata strip — subtle, below title */
    .lyrics-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      padding: 0.75rem 0 1.25rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .lyrics-meta strong { color: var(--text-sub); font-weight: 600; }

    /* Reader controls — minimal floating bar */
    .reader-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 30px;
      margin-bottom: 2.5rem;
      width: fit-content;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .ctrl-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      padding: 0.28rem 0.65rem;
      border-radius: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .ctrl-btn.active { background: var(--accent-dim); border-color: rgba(var(--accent-rgb),0.5); color: var(--accent); }

    .scroll-speed {
      accent-color: var(--accent);
      width: 70px;
      cursor: pointer;
    }

    /* THE LYRICS THEMSELVES */
    .lyrics-body {
      /* No max-height cap — lyrics flow freely on the page */
    }

    .lyrics-text {
      font-family: var(--lyric-font);
      font-size: 1.45rem;
      line-height: 2.4;
      color: var(--lyric-color);
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
      letter-spacing: 0.01em;
      transition: font-size 0.2s ease;
    }

    .lyric-line {
      display: block;
      padding: 0.1rem 0.5rem;
      border-radius: 6px;
      transition: background 0.15s ease;
      margin-bottom: 0.4rem;
    }
    .lyric-line:empty::before { content: '\00a0'; } /* preserve blank separator lines */
    .lyric-line:hover { background: rgba(var(--accent-rgb), 0.06); }

    /* Empty stanza separator */
    .lyric-blank { display: block; height: 1.4rem; }

    /* ==========================================================================
       Search Results
       ========================================================================== */
    .highlight {
      background: rgba(var(--accent-rgb), 0.25);
      color: var(--text);
      border-radius: 3px;
      padding: 0 2px;
    }

    /* ==========================================================================
       Shared UI: Empty State
       ========================================================================== */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .empty-state svg { width: 40px; height: 40px; opacity: 0.5; }
    .empty-state p { font-size: 0.95rem; }

    /* ==========================================================================
       Animations & Utilities
       ========================================================================== */
    .hidden { display: none !important; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease-out both; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==========================================================================
       Responsive
       ========================================================================== */
    @media (max-width: 640px) {
      header { padding: 0 1rem; gap: 0.75rem; }
      .logo-name { display: none; }
      .page { padding: 1.25rem 1rem 3rem; }
      .lyrics-song-title { font-size: 1.4rem; }
      .lyrics-text { font-size: 1.2rem; line-height: 2.2; }
      .reader-controls { gap: 0.5rem; padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>

<div class="app-container" style="position:relative;">

  <!-- ========== HEADER ========== -->
  <header>
    <div class="logo" onclick="router.navigate('artists')">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <span class="logo-name">أثير الكلمات</span>
    </div>

    <div class="search-wrap">
      <input type="text" id="global-search" class="search-input" placeholder="ابحث عن أغنية، فنان، أو كلمات…">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>

    <div class="header-actions">
      <!-- Favorites toggle -->
      <button class="hbtn" id="fav-toggle-btn" title="المحفوظات" onclick="favPanel.toggle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="badge" id="fav-count">0</span>
      </button>

      <!-- Theme picker -->
      <div class="theme-picker">
        <button class="hbtn" id="theme-btn" title="تغيير المظهر">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <div class="theme-dropdown" id="theme-dropdown">
          <button class="theme-btn" onclick="themeManager.setTheme('dark'); closeTheme()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            داكن
          </button>
          <button class="theme-btn" onclick="themeManager.setTheme('light'); closeTheme()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            مضيء
          </button>
          <button class="theme-btn" onclick="themeManager.setTheme('sepia'); closeTheme()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            ورقي
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Favorites slide-down panel -->
  <div class="fav-panel" id="fav-panel">
    <div class="fav-panel-inner">
      <div class="fav-panel-header">
        <span>المحفوظات</span>
        <span id="fav-panel-count" style="color:var(--text-muted)"></span>
      </div>
      <ul class="fav-list" id="fav-list">
        <!-- populated by JS -->
      </ul>
    </div>
  </div>

  <!-- ========== MAIN ========== -->
  <main class="page">
    <div id="router-view" class="fade-up"></div>
  </main>

</div>

<script>
// ==========================================================================
// SAFE STORAGE
// ==========================================================================
const storage = {
  _fb: {},
  getItem(k) { try { return localStorage.getItem(k); } catch { return this._fb[k]||null; } },
  setItem(k,v) { try { localStorage.setItem(k,v); } catch { this._fb[k]=String(v); } }
};

// ==========================================================================
// 1. DATABASE
// ==========================================================================
let database = null;

async function loadDatabase() {
  let raw;
  try {
    const res = await fetch('songs.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    raw = await res.json();
  } catch(e) {
    throw new Error('fetch_failed: ' + e.message);
  }
  if (!Array.isArray(raw) || raw.length === 0) throw new Error('empty_or_invalid');

  const slugify = str =>
    str.trim().replace(/\s+/g,'-').replace(/[^a-zA-Z0-9\u0600-\u06FF-]/g,'').toLowerCase();

  const artistMap = new Map();
  raw.forEach(entry => {
    const name = (entry.artist||'').trim();
    if (!name) return;
    const id = slugify(name);
    if (!artistMap.has(id)) artistMap.set(id, { id, name });
  });

  const songs = raw.map((entry, idx) => {
    const artistName = (entry.artist||'').trim();
    const artistId   = slugify(artistName);
    const title      = (entry.title||'').trim();
    const meta       = entry.metadata || {};
    return {
      id:       slugify(title + '-' + artistId) || String(idx),
      artistId,
      title,
      lyrics:   (entry.lyrics||'').trim(),
      lyricist: (meta['كلمات']||'').trim(),
      composer: (meta['ألحان']||'').trim(),
      year:     (meta['تاريخ']||'').trim(),
      url:      entry.url || ''
    };
  });

  const artists = Array.from(artistMap.values()).map(a => ({
    ...a,
    songsCount: songs.filter(s => s.artistId === a.id).length
  }));

  database = { artists, songs };
}

// ==========================================================================
// 2. THEME MANAGER
// ==========================================================================
const themeManager = {
  init() {
    this.setTheme(storage.getItem('theme') || 'dark');
    document.getElementById('theme-btn').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('theme-dropdown').classList.toggle('open');
    });
    document.addEventListener('click', () =>
      document.getElementById('theme-dropdown').classList.remove('open'));
  },
  setTheme(t) {
    document.documentElement.setAttribute('theme', t);
    storage.setItem('theme', t);
  }
};
function closeTheme() {
  document.getElementById('theme-dropdown').classList.remove('open');
}

// ==========================================================================
// 3. BOOKMARK MANAGER
// ==========================================================================
const bookmarkManager = {
  favs: [],

  init() {
    try { this.favs = JSON.parse(storage.getItem('favs')||'[]'); } catch { this.favs=[]; }
    this.render();
  },

  toggle(songId) {
    if (this.favs.includes(songId)) {
      this.favs = this.favs.filter(id => id !== songId);
    } else {
      this.favs.push(songId);
    }
    storage.setItem('favs', JSON.stringify(this.favs));
    this.render();
    return this.favs.includes(songId);
  },

  isFav(songId) { return this.favs.includes(songId); },

  render() {
    const listEl = document.getElementById('fav-list');
    const countEl = document.getElementById('fav-count');
    const panelCountEl = document.getElementById('fav-panel-count');
    if (countEl) countEl.textContent = this.favs.length;
    if (panelCountEl) panelCountEl.textContent = this.favs.length ? `${this.favs.length} أغنية` : '';

    if (!listEl || !database) return;

    if (this.favs.length === 0) {
      listEl.innerHTML = `<li class="fav-empty">لا توجد أغانٍ محفوظة بعد. اضغط ♥ في أي أغنية لحفظها هنا.</li>`;
      return;
    }

    listEl.innerHTML = '';
    this.favs.forEach(songId => {
      const song = database.songs.find(s => s.id === songId);
      if (!song) return;
      const artist = database.artists.find(a => a.id === song.artistId);
      const li = document.createElement('li');
      const chip = document.createElement('div');
      chip.className = 'fav-chip';
      chip.onclick = () => {
        favPanel.close();
        router.navigate('lyrics', { songId: song.id });
      };
      chip.innerHTML = `
        <div>
          <div class="fav-chip-title">${song.title}</div>
          <div class="fav-chip-artist">${artist ? artist.name : ''}</div>
        </div>
        <button class="fav-chip-remove" title="إزالة" onclick="event.stopPropagation(); bookmarkManager.toggle('${song.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      li.appendChild(chip);
      listEl.appendChild(li);
    });
  }
};

// ==========================================================================
// 4. FAVORITES PANEL
// ==========================================================================
const favPanel = {
  isOpen: false,
  toggle() {
    this.isOpen ? this.close() : this.open();
  },
  open() {
    this.isOpen = true;
    document.getElementById('fav-panel').classList.add('open');
    document.getElementById('fav-toggle-btn').style.color = 'var(--accent)';
  },
  close() {
    this.isOpen = false;
    document.getElementById('fav-panel').classList.remove('open');
    document.getElementById('fav-toggle-btn').style.color = '';
  }
};

// Close fav panel on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('fav-panel');
  const btn   = document.getElementById('fav-toggle-btn');
  if (favPanel.isOpen && !panel.contains(e.target) && !btn.contains(e.target)) {
    favPanel.close();
  }
});

// ==========================================================================
// 5. AUTO SCROLLER
// ==========================================================================
const autoScroller = {
  active: false,
  speed: 0.8,
  animId: null,
  lastTime: 0,
  target: null,   // element to scroll (document.documentElement for page scroll)

  init() {
    // Always scroll the main page
    this.target = document.documentElement;
    this.stop();
  },

  setSpeed(v) { this.speed = parseFloat(v) * 0.5; },

  toggle() {
    this.active ? this.stop() : this.start();
    return this.active;
  },

  start() {
    this.active = true;
    this.lastTime = performance.now();
    const loop = (time) => {
      if (!this.active) return;
      const delta = time - this.lastTime;
      this.lastTime = time;
      window.scrollBy(0, this.speed * (delta / 16.67));
      const atBottom = (window.innerHeight + window.scrollY) >= document.body.scrollHeight - 4;
      if (atBottom) {
        this.stop();
        const btn = document.getElementById('scroll-toggle');
        if (btn) { btn.classList.remove('active'); btn.textContent = 'تشغيل التمرير'; }
      } else {
        this.animId = requestAnimationFrame(loop);
      }
    };
    this.animId = requestAnimationFrame(loop);
  },

  stop() {
    this.active = false;
    if (this.animId) cancelAnimationFrame(this.animId);
  }
};

// ==========================================================================
// 6. ROUTER
// ==========================================================================
const router = {
  view: 'artists',
  params: {},

  init() {
    document.getElementById('stat-songs-count') &&
      (document.getElementById('stat-songs-count').textContent = database.songs.length);

    const search = document.getElementById('global-search');
    search.addEventListener('input', e => {
      const q = e.target.value.trim();
      if (q.length > 0) this.navigate('search', { query: q });
      else this.navigate('artists');
    });

    this.navigate('artists');
  },

  navigate(view, params = {}) {
    autoScroller.stop();
    this.view   = view;
    this.params = params;
    if (view !== 'search') {
      document.getElementById('global-search').value = '';
    }
    this.render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },

  render() {
    const el = document.getElementById('router-view');
    el.innerHTML = '';
    el.className = 'fade-up';
    // force re-trigger animation
    void el.offsetWidth;

    switch(this.view) {
      case 'artists': this.renderArtists(el); break;
      case 'songs':   this.renderSongs(el, this.params.artistId); break;
      case 'lyrics':  this.renderLyrics(el, this.params.songId); break;
      case 'search':  this.renderSearch(el, this.params.query); break;
    }
  },

  // ── Artists Grid ──────────────────────────────────────────────────────────
  renderArtists(el) {
    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = 'الفنانون';
    el.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid-artists';

    database.artists.forEach(artist => {
      const card = document.createElement('div');
      card.className = 'card-artist';
      card.onclick = () => this.navigate('songs', { artistId: artist.id });
      card.innerHTML = `
        <div class="artist-name">${artist.name}</div>
        <div class="artist-count"><span>${artist.songsCount}</span> أغنية</div>
      `;
      grid.appendChild(card);
    });

    el.appendChild(grid);
  },

  // ── Songs List ────────────────────────────────────────────────────────────
  renderSongs(el, artistId) {
    const artist = database.artists.find(a => a.id === artistId);
    if (!artist) return;

    // Breadcrumb
    const bc = document.createElement('div');
    bc.className = 'breadcrumb';
    bc.innerHTML = `
      <a href="#" onclick="event.preventDefault(); router.navigate('artists')">الفنانون</a>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span>${artist.name}</span>
    `;
    el.appendChild(bc);

    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = `أغاني ${artist.name}`;
    el.appendChild(title);

    const list = document.createElement('div');
    list.className = 'songs-list';

    database.songs.filter(s => s.artistId === artistId).forEach(song => {
      const card = document.createElement('div');
      card.className = 'card-song';
      card.onclick = () => this.navigate('lyrics', { songId: song.id });

      const metaParts = [];
      if (song.lyricist) metaParts.push(`كلمات: ${song.lyricist}`);
      if (song.composer) metaParts.push(`ألحان: ${song.composer}`);

      card.innerHTML = `
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          ${metaParts.length ? `<div class="song-meta-row">${metaParts.join('<span style="color:var(--border)">·</span>')}</div>` : ''}
          <div class="song-snippet-row">${song.lyrics.substring(0,80)}…</div>
        </div>
        ${song.year ? `<div class="song-year-badge">${song.year}</div>` : ''}
      `;
      list.appendChild(card);
    });

    el.appendChild(list);
  },

  // ── Lyrics Screen ─────────────────────────────────────────────────────────
  renderLyrics(el, songId) {
    const song = database.songs.find(s => s.id === songId);
    if (!song) return;
    const artist = database.artists.find(a => a.id === song.artistId);

    autoScroller.init();

    const page = document.createElement('div');
    page.className = 'lyrics-page';

    // ── Top bar: back + title + bookmark
    const topbar = document.createElement('div');
    topbar.className = 'lyrics-topbar';

    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.title = 'رجوع';
    backBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
    backBtn.onclick = () => this.navigate('songs', { artistId: song.artistId });

    const titleBlock = document.createElement('div');
    titleBlock.className = 'lyrics-title-block';
    titleBlock.innerHTML = `
      <div class="lyrics-song-title">${song.title}</div>
      <div class="lyrics-artist-name">${artist ? artist.name : ''}</div>
    `;

    // Bookmark + Copy actions
    const actions = document.createElement('div');
    actions.className = 'lyrics-topbar-actions';

    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'hbtn';
    copyBtn.title = 'نسخ الكلمات';
    copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(song.lyrics).then(() => {
        copyBtn.style.color = 'var(--accent)';
        setTimeout(() => copyBtn.style.color = '', 1500);
      });
    };

    // Bookmark button
    const favBtn = document.createElement('button');
    favBtn.className = 'hbtn';
    favBtn.id = 'song-fav-btn';
    const updateFavBtn = (isFav) => {
      favBtn.title = isFav ? 'إزالة من المحفوظات' : 'حفظ في المحفوظات';
      favBtn.innerHTML = isFav
        ? `<svg viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    };
    updateFavBtn(bookmarkManager.isFav(song.id));
    favBtn.onclick = () => {
      bookmarkManager.toggle(song.id);
      updateFavBtn(bookmarkManager.isFav(song.id));
    };

    actions.appendChild(copyBtn);
    actions.appendChild(favBtn);
    topbar.appendChild(backBtn);
    topbar.appendChild(titleBlock);
    topbar.appendChild(actions);
    page.appendChild(topbar);

    // ── Metadata strip
    if (song.lyricist || song.composer || song.year) {
      const meta = document.createElement('div');
      meta.className = 'lyrics-meta';
      if (song.lyricist) meta.innerHTML += `<span>كلمات: <strong>${song.lyricist}</strong></span>`;
      if (song.composer) meta.innerHTML += `<span>ألحان: <strong>${song.composer}</strong></span>`;
      if (song.year)     meta.innerHTML += `<span>سنة: <strong>${song.year}</strong></span>`;
      page.appendChild(meta);
    }

    // ── Reader controls (font size + auto-scroll only)
    const controls = document.createElement('div');
    controls.className = 'reader-controls';

    // Font size
    const fontLabel = document.createElement('span');
    fontLabel.className = 'ctrl-label';
    fontLabel.textContent = 'الخط';
    controls.appendChild(fontLabel);

    let fontSize = 1.45;
    const decBtn = document.createElement('button');
    decBtn.className = 'ctrl-btn';
    decBtn.textContent = 'أ−';
    decBtn.title = 'تصغير الخط';
    decBtn.onclick = () => {
      if (fontSize > 1.0) { fontSize = Math.round((fontSize - 0.1) * 10) / 10; lyricsText.style.fontSize = fontSize + 'rem'; }
    };
    const incBtn = document.createElement('button');
    incBtn.className = 'ctrl-btn';
    incBtn.textContent = 'أ+';
    incBtn.title = 'تكبير الخط';
    incBtn.onclick = () => {
      if (fontSize < 2.2) { fontSize = Math.round((fontSize + 0.1) * 10) / 10; lyricsText.style.fontSize = fontSize + 'rem'; }
    };
    controls.appendChild(decBtn);
    controls.appendChild(incBtn);

    const div1 = document.createElement('div'); div1.className = 'ctrl-divider';
    controls.appendChild(div1);

    // Auto-scroll
    const scrollLabel = document.createElement('span');
    scrollLabel.className = 'ctrl-label';
    scrollLabel.textContent = 'تمرير';
    controls.appendChild(scrollLabel);

    const scrollBtn = document.createElement('button');
    scrollBtn.className = 'ctrl-btn';
    scrollBtn.id = 'scroll-toggle';
    scrollBtn.textContent = 'تشغيل ▶';
    scrollBtn.onclick = () => {
      const on = autoScroller.toggle();
      scrollBtn.classList.toggle('active', on);
      scrollBtn.textContent = on ? 'إيقاف ◼' : 'تشغيل ▶';
    };
    controls.appendChild(scrollBtn);

    const speedSlider = document.createElement('input');
    speedSlider.type = 'range';
    speedSlider.className = 'scroll-speed';
    speedSlider.min = 1; speedSlider.max = 5; speedSlider.value = 2;
    autoScroller.setSpeed(2);
    speedSlider.oninput = e => autoScroller.setSpeed(e.target.value);
    controls.appendChild(speedSlider);

    page.appendChild(controls);

    // ── The lyrics
    const lyricsBody = document.createElement('div');
    lyricsBody.className = 'lyrics-body';

    const lyricsText = document.createElement('div');
    lyricsText.className = 'lyrics-text';

    song.lyrics.split('\n').forEach(line => {
      const p = document.createElement('p');
      if (line.trim() === '') {
        p.className = 'lyric-blank';
      } else {
        p.className = 'lyric-line';
        p.textContent = line;
      }
      lyricsText.appendChild(p);
    });

    lyricsBody.appendChild(lyricsText);
    page.appendChild(lyricsBody);
    el.appendChild(page);
  },

  // ── Search Results ────────────────────────────────────────────────────────
  renderSearch(el, query) {
    const norm = t => t.toLowerCase()
      .replace(/[أإآا]/g,'ا').replace(/[ىي]/g,'ي').replace(/[ةه]/g,'ه').trim();
    const nq = norm(query);

    const matches = database.songs.filter(s => {
      const a = database.artists.find(x => x.id === s.artistId);
      return norm(s.title).includes(nq)
          || norm(s.lyrics).includes(nq)
          || norm(s.lyricist).includes(nq)
          || norm(s.composer).includes(nq)
          || (a && norm(a.name).includes(nq));
    });

    const title = document.createElement('h2');
    title.className = 'section-title';
    title.textContent = `نتائج البحث عن: "${query}"`;
    el.appendChild(title);

    if (matches.length === 0) {
      el.innerHTML += `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>لم نجد نتائج لـ «${query}»</p>
      </div>`;
      return;
    }

    const escape = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const highlightRx = new RegExp(`(${escape(query)})`, 'gi');

    const list = document.createElement('div');
    list.className = 'songs-list';

    matches.forEach(song => {
      const artist = database.artists.find(a => a.id === song.artistId);
      const card = document.createElement('div');
      card.className = 'card-song';
      card.onclick = () => this.navigate('lyrics', { songId: song.id });

      // Snippet with highlight
      let snippet = song.lyrics.substring(0, 90) + '…';
      const mi = norm(song.lyrics).indexOf(nq);
      if (mi !== -1) {
        const s = Math.max(0, mi - 30);
        const e = Math.min(song.lyrics.length, mi + query.length + 50);
        snippet = (s > 0 ? '…' : '') + song.lyrics.substring(s, e) + (e < song.lyrics.length ? '…' : '');
        snippet = snippet.replace(highlightRx, '<mark class="highlight">$1</mark>');
      }

      let htitle = song.title;
      if (norm(song.title).includes(nq)) htitle = htitle.replace(highlightRx, '<mark class="highlight">$1</mark>');

      card.innerHTML = `
        <div class="song-info">
          <div class="song-title">${htitle}</div>
          <div class="song-meta-row">${artist ? artist.name : ''}</div>
          <div class="song-snippet-row">${snippet}</div>
        </div>
        ${song.year ? `<div class="song-year-badge">${song.year}</div>` : ''}
      `;
      list.appendChild(card);
    });

    el.appendChild(list);
  }
};

// ==========================================================================
// INIT
// ==========================================================================
window.addEventListener('DOMContentLoaded', async () => {
  themeManager.init();

  // Show loader
  const view = document.getElementById('router-view');
  view.innerHTML = `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation:spin 1s linear infinite">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      <p>جارٍ تحميل البيانات…</p>
    </div>
  `;

  try {
    await loadDatabase();
  } catch(e) {
    console.error(e);
    view.innerHTML = `<div class="empty-state"><p style="color:#ef4444">تعذّر تحميل <strong>songs.json</strong>. تأكد من وجوده في نفس المجلد وأن الصفحة تعمل عبر خادم ويب.</p></div>`;
    return;
  }

  bookmarkManager.init();
  router.init();
});
</script>
